<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Salon Banner Studio</title>
  <meta name="theme-color" content="#f7f1ea">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand-mark">SBS</div>
      <h1>Salon Banner Studio</h1>
      <p>Professional Banner Creator</p>
      <span>写真をそのまま使うので、顔は変わりません。</span>
    </header>

    <section class="sticky-preview">
      <div class="preview-head">
        <strong>プレビュー</strong>
        <span>750×250px</span>
      </div>
      <div class="preview"><canvas id="canvas" width="750" height="250"></canvas></div>
    </section>

    <section class="panel">
      <h2>1. 画像を選択</h2>
      <input id="files" class="file-input" type="file" accept="image/*" multiple>
      <p class="note">4枚・5枚に対応。ドラッグで順番変更できます。</p>
      <div id="slots" class="slots"></div>
    </section>

    <section class="panel">
      <h2>2. 画像ごとの調整</h2>
      <p class="note">プレビューを見ながら、左右・上下・拡大・左右反転を調整できます。</p>
      <div id="controls" class="controls"></div>
    </section>

    <section class="panel">
      <h2>3. 文字設定</h2>
      <label>サロン名・ブランド名</label>
      <input id="shop" type="text" value="Salon Name">

      <div class="grid-2">
        <div><label>書体</label><select id="fontFamily">
          <option value="mincho" selected>明朝</option><option value="serif">Serif / 高級感</option>
          <option value="gothic">ゴシック</option><option value="didot">Didot風</option>
          <option value="bodoni">Bodoni風</option><option value="script">筆記体風</option>
        </select></div>
        <div><label>文字色</label><input id="textColor" type="color" value="#ffffff"></div>
        <div><label>文字サイズ</label><input id="fontSize" type="number" value="34" min="10" max="90"></div>
        <div><label>文字位置</label><select id="textPos">
          <option value="bottom" selected>下中央</option>
          <option value="bottomLeft">左下</option>
          <option value="bottomRight">右下</option>
          <option value="center">中央</option>
          <option value="top">上中央</option>
          <option value="none">文字なし</option>
        </select></div>
      </div>

      <div class="swatches">
        <button class="swatch" style="background:#ffffff" data-color="#ffffff" title="白"></button>
        <button class="swatch" style="background:#111111" data-color="#111111" title="黒"></button>
        <button class="swatch" style="background:#8a8782" data-color="#8a8782" title="グレー"></button>
        <button class="swatch" style="background:#d7c4aa" data-color="#d7c4aa" title="ベージュ"></button>
        <button class="swatch" style="background:#c7a15a" data-color="#c7a15a" title="ゴールド"></button>
      </div>
      <label class="check"><input id="shadowOn" type="checkbox" checked> 文字の影を入れる</label>
    </section>

    <section class="panel">
      <h2>4. シームレス設定</h2>
      <label class="check"><input id="seamlessOn" type="checkbox" checked> シームレスコラージュ風にする</label>
      <div class="grid-2">
        <div><label>重なり幅</label><input id="overlap" type="number" value="18" min="0" max="60"></div>
        <div><label>境界ぼかし</label><input id="fadeWidth" type="number" value="42" min="0" max="100"></div>
      </div>
      <p class="note">重なり＋フェードで境界を自然に馴染ませます。</p>
    </section>

    <section class="panel action-panel">
      <button id="save" class="primary">PNG保存</button>
      <p id="status" class="note"></p>
      <div id="imgOut"></div>
    </section>

    <footer>© Salon Banner Studio</footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
